name: Update Profile README

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup GH CLI
        run: gh --version

      - name: Generate README
        run: bash scripts/generate-readme.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "devterminal-bot"
          git config user.email "bot@bharathraj.dev"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update profile dashboard [skip ci]"
            git push
          fi

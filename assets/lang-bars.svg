<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 194" width="500" height="194">
  <rect width="500" height="194" fill="#0d1117" rx="6"/>
  <text x="10" y="16" font-family="Courier New,monospace" font-size="9" fill="#58a6ff">┌─ LANGUAGE DISTRIBUTION ───────────────────────────────────┐</text>
  
    <text x="10" y="40" font-family="Courier New,monospace" font-size="11" fill="#c9d1d9">Dart</text>
    <rect x="120" y="29" width="123" height="14" rx="3" fill="#00B4AB" opacity="0.9">
      <animate attributeName="width" from="0" to="123" dur="1s" begin="0.0s" fill="freeze"/>
    </rect>
    <text x="251" y="40" font-family="Courier New,monospace" font-size="9" fill="#8b949e">32%</text>
    <text x="10" y="64" font-family="Courier New,monospace" font-size="11" fill="#c9d1d9">JavaScript</text>
    <rect x="120" y="53" width="82" height="14" rx="3" fill="#F7DF1E" opacity="0.9">
      <animate attributeName="width" from="0" to="82" dur="1s" begin="1.5s" fill="freeze"/>
    </rect>
    <text x="210" y="64" font-family="Courier New,monospace" font-size="9" fill="#8b949e">21%</text>
    <text x="10" y="88" font-family="Courier New,monospace" font-size="11" fill="#c9d1d9">TypeScript</text>
    <rect x="120" y="77" width="77" height="14" rx="3" fill="#3178C6" opacity="0.9">
      <animate attributeName="width" from="0" to="77" dur="1s" begin="3.0s" fill="freeze"/>
    </rect>
    <text x="205" y="88" font-family="Courier New,monospace" font-size="9" fill="#8b949e">20%</text>
    <text x="10" y="112" font-family="Courier New,monospace" font-size="11" fill="#c9d1d9">Python</text>
    <rect x="120" y="101" width="41" height="14" rx="3" fill="#3776AB" opacity="0.9">
      <animate attributeName="width" from="0" to="41" dur="1s" begin="4.5s" fill="freeze"/>
    </rect>
    <text x="169" y="112" font-family="Courier New,monospace" font-size="9" fill="#8b949e">10%</text>
    <text x="10" y="136" font-family="Courier New,monospace" font-size="11" fill="#c9d1d9">C++</text>
    <rect x="120" y="125" width="32" height="14" rx="3" fill="#00599C" opacity="0.9">
      <animate attributeName="width" from="0" to="32" dur="1s" begin="6.0s" fill="freeze"/>
    </rect>
    <text x="160" y="136" font-family="Courier New,monospace" font-size="9" fill="#8b949e">8%</text>
    <text x="10" y="160" font-family="Courier New,monospace" font-size="11" fill="#c9d1d9">Jupyter Notebook</text>
    <rect x="120" y="149" width="22" height="14" rx="3" fill="#8b949e" opacity="0.9">
      <animate attributeName="width" from="0" to="22" dur="1s" begin="7.5s" fill="freeze"/>
    </rect>
    <text x="150" y="160" font-family="Courier New,monospace" font-size="9" fill="#8b949e">6%</text>
  <text x="10" y="182" font-family="Courier New,monospace" font-size="9" fill="#58a6ff">└──────────────────────────────────────────────────────────┘</text>
</svg>
